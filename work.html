  <!-- Navigation -->

    <section class="reel">

        <div class="reel-play">

        <div class="modal-video">

        </div>
        <div class="modal-details"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-prev">&larr; Prev</button>
        <span class="modal-counter"></span>
